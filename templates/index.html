<!DOCTYPE html>
<html>
<head>
    <title>Empathy Engine</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            font-family: Arial, sans-serif;
        }

        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-right: 10px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background-color: #2a5298;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1e3c72;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Empathy Engine 🎤</h2>

        <form action="/generate_ui" method="post">
            <input type="text" name="text" placeholder="Enter text..." required>
            <button type="submit">Generate Voice</button>
        </form>
    </div>

</body>
</html>
